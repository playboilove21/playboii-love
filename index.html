<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayBoi Love</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family: Orbitron;
  background:black;
  color:white;
}

/* GLOW BACKGROUND (same everywhere) */
.bg {
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(255,0,200,0.25), transparent 40%),
    radial-gradient(circle at bottom, rgba(160,0,255,0.18), transparent 60%);
  z-index:-1;
}

/* NAV (same everywhere) */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #ff2bd6;
}

.logo {
  font-family:Bebas Neue;
  font-size:24px;
  color:#ff2bd6;
}

nav a {
  color:white;
  text-decoration:none;
  margin:0 10px;
}

/* HERO */
.hero {
  text-align:center;
  padding:70px 20px;
}

.hero h1 {
  font-family:Bebas Neue;
  font-size:70px;
  color:#ff2bd6;
  text-shadow:0 0 25px rgba(255,0,200,0.5);
  margin:0;
}

.hero p {
  opacity:0.8;
  font-size:14px;
  margin-top:10px;
}

/* BUTTON */
.btn {
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  border-radius:25px;
  background:linear-gradient(90deg,#ff2bd6,#a100ff);
  color:black;
  font-weight:bold;
  text-decoration:none;
}

/* SECTIONS */
.section {
  text-align:center;
  padding:40px 20px;
}

.section h2 {
  font-family:Bebas Neue;
  color:#ff2bd6;
  font-size:40px;
}

/* CARDS */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
  gap:15px;
  padding:20px;
}

.card {
  border:1px solid #ff2bd6;
  padding:15px;
  border-radius:12px;
  background:rgba(255,255,255,0.03);
}

/* SOCIAL */
.socials a {
  font-size:24px;
  margin:0 10px;
  text-decoration:none;
  color:white;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  border-top:1px solid #ff2bd6;
  margin-top:40px;
  font-size:12px;
  opacity:0.7;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- NAV -->
<nav>
  <div class="logo">PLAYBOI LOVE</div>
  <div>
    <a href="index.html">Home</a>
    <a href="music.html">Music</a>
    <a href="merch.html">Merch</a>
    <a href="vault.html">Vault</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>PLAYBOI LOVE</h1>
  <p>Music • Fashion • Culture • LoveWorld Productions</p>

  <a class="btn" href="music.html">ENTER LOVEWORLD</a>
</div>

<!-- QUICK LINKS -->
<div class="section">
  <h2>QUICK LINKS</h2>

  <div class="grid">

    <div class="card">SHOP</div>
    <div class="card">MUSIC</div>
    <div class="card">VAULT</div>
    <div class="card">NEWS</div>
    <div class="card">CONTACT</div>
    <div class="card">CAMPAIGNS</div>

  </div>
</div>

<!-- SOCIAL -->
<div class="section">
  <h2>FOLLOW</h2>

  <div class="socials">
    <a href="#">📸</a>
    <a href="#">𝕏</a>
    <a href="#">▶️</a>
    <a href="#">🎵</a>
  </div>
</div>

<!-- FOOTER -->
<footer>
  PlayBoi Love © 2026 • LoveWorld Productions
</footer>

</body>
</html>
