<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayBoi Love • Login / Logout</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family: Orbitron;
  background:black;
  color:white;
  text-align:center;
}

/* NEON BACKGROUND */
.bg {
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(255,0,200,0.25), transparent 40%),
    radial-gradient(circle at bottom, rgba(160,0,255,0.18), transparent 60%);
  z-index:-1;
}

/* CONTAINER */
.box {
  max-width:340px;
  margin:120px auto;
  padding:20px;
  border:1px solid #ff2bd6;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 20px rgba(255,0,200,0.2);
}

h1 {
  font-family:Bebas Neue;
  color:#ff2bd6;
  font-size:40px;
}

/* INPUTS */
input {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:black;
  border:1px solid #ff2bd6;
  color:white;
  border-radius:8px;
}

/* BUTTONS */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:25px;
  font-weight:bold;
  cursor:pointer;
}

/* LOGIN BUTTON */
.loginBtn {
  background:linear-gradient(90deg,#ff2bd6,#a100ff);
  color:black;
}

/* LOGOUT BUTTON */
.logoutBtn {
  background:white;
  color:black;
}

/* STATUS TEXT */
.status {
  margin-top:15px;
  font-size:13px;
  opacity:0.8;
}

.badge {
  display:inline-block;
  margin-top:10px;
  padding:5px 10px;
  border:1px solid #ff2bd6;
  border-radius:20px;
  font-size:12px;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="box">

  <h1>LOGIN SYSTEM</h1>

  <div class="badge">PLAYBOI LOVE ACCESS</div>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button class="loginBtn" onclick="login()">Login</button>
  <button class="logoutBtn" onclick="logout()">Logout</button>

  <div class="status" id="status">Status: Not logged in</div>

</div>

<script>

/* BASIC SESSION LOGIN (NOT VAULT RELATED) */
const USER = "ADMIN";
const PASS = "Permission";

/* LOGIN FUNCTION */
function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if (u === USER && p === PASS) {

    localStorage.setItem("pbl_login", "true");

    document.getElementById("status").innerText =
      "Status: Logged in (session active)";

  } else {
    alert("Incorrect login");
  }
}

/* LOGOUT FUNCTION */
function logout() {
  localStorage.removeItem("pbl_login");

  document.getElementById("status").innerText =
    "Status: Not logged in";
}

/* CHECK SESSION ON LOAD */
window.onload = function () {
  if (localStorage.getItem("pbl_login") === "true") {
    document.getElementById("status").innerText =
      "Status: Logged in (session active)";
  }
};

</script>

</body>
</html>
