<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:black;color:white;font-family:Orbitron;}
nav{display:flex;justify-content:space-between;padding:15px;border-bottom:1px solid #ff2bd6;}
nav a{color:white;margin:0 10px;text-decoration:none;}
.logo{color:#ff2bd6;font-family:Bebas Neue;}
.box{text-align:center;margin-top:100px;}
input{padding:10px;margin:5px;border:1px solid #ff2bd6;background:black;color:white;}
button{padding:10px;margin:5px;border:none;background:#ff2bd6;}
</style>
</head>

<body>

<nav>
  <div class="logo">PLAYBOI LOVE</div>
  <div>
    <a href="index.html">Home</a>
    <a href="music.html">Music</a>
    <a href="merch.html">Merch</a>
    <a href="vault.html">Vault</a>
    <a href="login-log-out.html">Login</a>
  </div>
</nav>

<div class="box">
  <h1>LOGIN</h1>

  <input id="u" placeholder="user">
  <input id="p" type="password" placeholder="pass">

  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>

  <p id="status"></p>
</div>

<script>
function login(){
if(document.getElementById("u").value==="ADMIN" &&
document.getElementById("p").value==="Permission"){
localStorage.setItem("login","true");
document.getElementById("status").innerText="Logged in";
}else{
alert("wrong");
}
}

function logout(){
localStorage.removeItem("login");
document.getElementById("status").innerText="Logged out";
}
</script>

</body>
</html>
